<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - AnalytixAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-color);
            color: var(--text-color);
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        h2 {
            margin-bottom: 1.5rem;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-family: inherit;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 1rem;
        }

        .alert-box {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
            font-size: 0.9em;
        }

        .alert-success {
            background-color: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
        }

        .alert-danger {
            background-color: rgba(220, 53, 69, 0.2);
            color: #dc3545;
            border: 1px solid #dc3545;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <h2>Reset Password</h2>

        <div id="alert-box" class="alert-box"></div>

        <form id="reset-form">
            <input type="hidden" id="token">

            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter new password" required
                    minlength="8">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm-password" class="form-control" placeholder="Confirm new password"
                    required>
            </div>

            <button type="submit" class="btn-primary" id="submit-btn">Reset Password</button>
        </form>

        <a href="index.html" class="btn-secondary" style="display: none;" id="login-link">Login Now</a>
    </div>

    <script>
        const API_BASE_URL = "http://127.0.0.1:8000";

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URL(window.location.href).searchParams;
            const token = urlParams.get('token');

            if (!token) {
                showAlert('Invalid or missing reset token.', 'danger');
                document.getElementById('reset-form').style.display = 'none';
                return;
            }

            document.getElementById('token').value = token;
        });

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const token = document.getElementById('token').value;

            if (password !== confirm) {
                showAlert('Passwords do not match.', 'danger');
                return;
            }

            if (password.length < 8) {
                showAlert('Password must be at least 8 characters.', 'danger');
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = "Processing...";

            try {
                const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: password })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(data.message, 'success');
                    document.getElementById('reset-form').style.display = 'none';
                    document.getElementById('login-link').style.display = 'block';
                } else {
                    showAlert(data.detail || 'Reset failed. Token may be expired.', 'danger');
                }
            } catch (error) {
                showAlert('Server error. Please try again later.', 'danger');
            } finally {
                btn.disabled = false;
                if (btn.textContent !== "Processing...") btn.textContent = "Reset Password";
            }
        });

        function showAlert(message, type) {
            const alertBox = document.getElementById('alert-box');
            alertBox.textContent = message;
            alertBox.className = `alert-box alert-${type}`;
            alertBox.style.display = 'block';
        }
    </script>
</body>

</html>
