<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - AnalytixAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-color);
            color: var(--text-color);
        }

        .verification-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .status-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        h1 {
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="verification-container" id="loading-state">
        <div class="loading-spinner"></div>
        <h1>Verifying Email...</h1>
        <p>Please wait while we verify your email address.</p>
    </div>

    <div class="verification-container hidden" id="success-state">
        <div class="status-icon">✅</div>
        <h1>Email Verified!</h1>
        <p>Your email address has been successfully verified. You can now access all features of AnalytixAI.</p>
        <a href="index.html" class="btn">Go to Dashboard</a>
    </div>

    <div class="verification-container hidden" id="error-state">
        <div class="status-icon">❌</div>
        <h1>Verification Failed</h1>
        <p id="error-message">The verification link is invalid or has expired.</p>
        <a href="index.html" class="btn">Back to Home</a>
    </div>

    <script>
        const API_BASE_URL = "http://127.0.0.1:8000";

        document.addEventListener('DOMContentLoaded', async () => {
            // Get token from URL query parameters
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                showError('No verification token found.');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/auth/verify-email/${token}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess();
                    // Update verification status in local storage if user is logged in
                    const user = JSON.parse(localStorage.getItem('analytix_user'));
                    if (user) {
                        user.is_verified = true;
                        localStorage.setItem('analytix_user', JSON.stringify(user));
                    }
                } else {
                    showError(data.detail || 'Verification failed. Please try again.');
                }
            } catch (error) {
                showError('An error occurred. Please try again later.');
                console.error('Verification error:', error);
            }
        });

        function showSuccess() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('success-state').classList.remove('hidden');
        }

        function showError(message) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');
            document.getElementById('error-message').textContent = message;
        }
    </script>
</body>

</html>
